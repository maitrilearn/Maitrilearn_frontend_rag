<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MaitriLearn — AI Teacher Board</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #0d1117;
  --panel:    #161b22;
  --border:   #30363d;
  --board:    #0d2137;
  --board2:   #0a1929;
  --chalk:    #e8e0d0;
  --chalk2:   #c8c0b0;
  --accent:   #58a6ff;
  --green:    #3fb950;
  --yellow:   #d29922;
  --red:      #f85149;
  --purple:   #bc8cff;
  --orange:   #ffa657;
  --cyan:     #39d3f0;
  --text:     #e6edf3;
  --muted:    #8b949e;
  --sidebar:  240px;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── LAYOUT ───────────────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh}

/* topbar */
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:0 20px;height:50px;flex-shrink:0;
  background:var(--panel);border-bottom:1px solid var(--border);
  font-size:13px;
}
.topbar-logo{font-weight:700;color:var(--accent);font-size:15px;letter-spacing:.5px}
.topbar-sep{color:var(--border);margin:0 4px}
.topbar-title{color:var(--muted)}
.topbar-spacer{flex:1}
.topbar-back{color:var(--muted);text-decoration:none;font-size:12px;transition:color .2s}
.topbar-back:hover{color:var(--accent)}

/* main */
.main{display:flex;flex:1;overflow:hidden}

/* ── LEFT SIDEBAR ─────────────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-top{padding:16px;border-bottom:1px solid var(--border)}

/* avatar */
.avatar-area{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 12px 0}
.avatar-ring{
  width:70px;height:70px;border-radius:50%;
  background:linear-gradient(135deg,#1c2938,#0d1f31);
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;position:relative;transition:border-color .3s;
}
.avatar-ring.talking{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(88,166,255,.15);
  animation:avatarPulse 1s ease-in-out infinite;
}
@keyframes avatarPulse{0%,100%{box-shadow:0 0 0 4px rgba(88,166,255,.15)}50%{box-shadow:0 0 0 8px rgba(88,166,255,.08)}}

.tutor-name{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:2px;text-align:center}

.speech-bubble{
  background:var(--bg);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;font-size:12px;color:var(--chalk2);line-height:1.5;
  text-align:center;min-height:48px;position:relative;
  margin:0 8px 8px;
}
.speech-bubble::before{
  content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-bottom-color:var(--border);
}
.speech-bubble::after{
  content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-bottom-color:var(--bg);
}

/* controls */
.controls{display:flex;flex-direction:column;gap:6px;padding:12px}
.topic-wrap{display:flex;flex-direction:column;gap:6px}
.topic-input{
  width:100%;padding:9px 12px;
  border-radius:7px;border:1px solid var(--border);
  background:var(--bg);color:var(--text);
  font-family:inherit;font-size:13px;outline:none;
  transition:border-color .2s;
}
.topic-input:focus{border-color:var(--accent)}
.topic-input::placeholder{color:var(--muted)}

.btn{
  width:100%;padding:9px;border-radius:7px;border:none;
  font-family:inherit;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;
}
.btn-primary{
  background:var(--accent);color:#0d1117;
  box-shadow:0 0 16px rgba(88,166,255,.2);
}
.btn-primary:hover:not(:disabled){box-shadow:0 0 24px rgba(88,166,255,.35);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-secondary{background:transparent;color:var(--yellow);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){background:rgba(210,153,34,.08)}
.btn-secondary:disabled{opacity:.3;cursor:not-allowed}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--border)}
.btn-danger:hover{background:rgba(248,81,73,.08)}

/* speed control */
.speed-row{display:flex;align-items:center;gap:8px;padding:0 12px 8px}
.speed-label{font-size:11px;color:var(--muted);white-space:nowrap}
.speed-slider{flex:1;accent-color:var(--accent);height:3px}

/* voice toggle */
.voice-row{display:flex;align-items:center;gap:8px;padding:0 12px 12px}
.voice-row label{font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px}
.voice-row input{accent-color:var(--accent)}

/* step progress */
.steps-section{flex:1;overflow-y:auto;padding:8px 0}
.steps-header{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);padding:4px 16px 8px;text-transform:uppercase}
.step-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;font-size:12px;color:var(--muted);
  cursor:default;transition:all .2s;border-left:2px solid transparent;
}
.step-row.active{color:var(--accent);border-left-color:var(--accent);background:rgba(88,166,255,.06)}
.step-row.done{color:var(--green);border-left-color:var(--green)}
.step-row .s-icon{font-size:13px;flex-shrink:0}
.step-row .s-num{
  width:17px;height:17px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;flex-shrink:0;
  background:var(--border);color:var(--muted);transition:all .2s;
}
.step-row.active .s-num{background:var(--accent);color:#0d1117}
.step-row.done  .s-num{background:var(--green);color:#0d1117}
.step-row .s-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11.5px}

/* status pill */
.status-row{padding:8px 12px;border-top:1px solid var(--border)}
.status-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.3);
}
.status-pill.loading{background:rgba(88,166,255,.12);color:var(--accent);border-color:rgba(88,166,255,.3)}
.status-pill.teaching{background:rgba(188,140,255,.12);color:var(--purple);border-color:rgba(188,140,255,.3)}
.status-pill.paused{background:rgba(210,153,34,.12);color:var(--yellow);border-color:rgba(210,153,34,.3)}
.status-pill.error{background:rgba(248,81,73,.12);color:var(--red);border-color:rgba(248,81,73,.3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.status-pill.loading .status-dot,.status-pill.teaching .status-dot{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CHALKBOARD ───────────────────────────────────────────────────── */
.board-wrap{
  flex:1;overflow:hidden;position:relative;
  background:var(--board);
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.025) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.025) 40px);
}
/* chalk dust top/bottom */
.board-wrap::before,.board-wrap::after{
  content:'';position:absolute;left:0;right:0;height:6px;pointer-events:none;z-index:10;
}
.board-wrap::before{top:0;background:linear-gradient(to bottom,rgba(232,224,208,.08),transparent)}
.board-wrap::after{bottom:0;background:linear-gradient(to top,rgba(232,224,208,.08),transparent)}

/* scrollable board */
#boardScroll{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding:32px 40px 48px;
  scroll-behavior:smooth;
}

/* idle overlay */
.idle-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  pointer-events:none;transition:opacity .4s;
}
.idle-overlay.hidden{opacity:0}
.idle-icon{font-size:48px;opacity:.2}
.idle-text{text-align:center;color:var(--muted);font-family:'Caveat',cursive;font-size:20px;line-height:1.7}

/* ── STEP CARDS ───────────────────────────────────────────────────── */
/* STEP MEMORY: cards stack vertically, never erased */
.step-card{
  margin-bottom:28px;
  opacity:0;transform:translateY(18px);
  transition:opacity .45s ease,transform .45s ease;
  position:relative;
}
.step-card.visible{opacity:1;transform:translateY(0)}

/* chalk divider between steps */
.step-card:not(:first-child)::before{
  content:'';display:block;
  height:1px;background:rgba(232,224,208,.08);
  margin-bottom:28px;
}

/* ── TITLE STEP ───────────────────────────────────────────────────── */
.title-card{text-align:center;padding:24px 0 8px}
.title-subject{
  display:inline-block;padding:3px 14px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  background:rgba(88,166,255,.12);color:var(--accent);border:1px solid rgba(88,166,255,.3);
  margin-bottom:18px;
}
.title-main{
  font-family:'Caveat',cursive;font-size:54px;font-weight:700;
  color:var(--chalk);line-height:1.1;margin-bottom:12px;
  text-shadow:0 0 40px rgba(232,224,208,.15);
}
.title-subtitle{
  font-size:15px;color:var(--chalk2);font-style:italic;
  max-width:600px;margin:0 auto;line-height:1.6;
}
.title-line{
  width:80px;height:3px;margin:20px auto 0;border-radius:2px;
  background:linear-gradient(90deg,var(--accent),var(--purple));
}

/* ── CONCEPT STEP ─────────────────────────────────────────────────── */
.concept-card{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.concept-def,.concept-analogy{
  padding:18px;border-radius:10px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
}
.concept-def{border-left:3px solid var(--accent)}
.concept-analogy{border-left:3px solid var(--yellow)}
.card-label{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:10px;
}
.concept-def .card-label{color:var(--accent)}
.concept-analogy .card-label{color:var(--yellow)}
.card-text{font-size:14px;color:var(--chalk);line-height:1.7}
.card-text.chalk{font-family:'Caveat',cursive;font-size:18px;color:var(--chalk2)}

/* ── STEPS STEP ───────────────────────────────────────────────────── */
.steps-card{display:flex;flex-direction:column;gap:0}
.step-item{
  display:flex;gap:16px;align-items:flex-start;
  padding:14px 0;opacity:0;transform:translateX(-16px);
  transition:opacity .35s ease,transform .35s ease;
}
.step-item.visible{opacity:1;transform:translateX(0)}
.step-item:not(:last-child){border-bottom:1px solid rgba(255,255,255,.05)}
.step-num{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;
  border:1.5px solid;
}
.step-name{font-size:14px;font-weight:600;color:var(--chalk);margin-bottom:4px;font-family:'Caveat',cursive;font-size:18px}
.step-detail{font-size:13px;color:var(--chalk2);line-height:1.6}

/* ── EXAMPLE STEP ─────────────────────────────────────────────────── */
.example-card{}
.example-scenario{
  font-size:14px;color:var(--chalk2);line-height:1.6;
  padding:14px;background:rgba(255,255,255,.03);border-radius:8px;
  border-left:3px solid var(--green);margin-bottom:14px;
  font-style:italic;
}
.code-block{
  background:#0d1117;border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;margin-bottom:14px;overflow-x:auto;
  font-family:'JetBrains Mono',monospace;font-size:13px;
  color:var(--green);line-height:1.6;
}
.code-prompt{color:var(--cyan);user-select:none}
.example-explanation{font-size:13px;color:var(--chalk2);line-height:1.7}

/* ── DIAGRAM STEP ─────────────────────────────────────────────────── */
.diagram-card-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:4px}
.diag-el{
  padding:16px;border-radius:10px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  opacity:0;transform:translateY(14px);
  transition:opacity .35s ease,transform .35s ease;
}
.diag-el.visible{opacity:1;transform:translateY(0)}
.diag-num{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;margin-bottom:10px;
}
.diag-label{font-size:14px;font-weight:600;color:var(--chalk);margin-bottom:6px;font-family:'Caveat',cursive;font-size:17px}
.diag-desc{font-size:12px;color:var(--muted);line-height:1.5}
.diag-role{
  display:inline-block;margin-top:8px;padding:2px 8px;border-radius:4px;
  font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
}

/* ── COMPARISON STEP ──────────────────────────────────────────────── */
.comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:4px;border-radius:10px;overflow:hidden}
.comp-side{padding:18px;background:rgba(255,255,255,.03)}
.comp-side.left{border-left:3px solid var(--red)}
.comp-side.right{border-left:3px solid var(--green)}
.comp-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.comp-side.left .comp-label{color:var(--red)}
.comp-side.right .comp-label{color:var(--green)}
.comp-point{
  display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;
  font-size:13px;color:var(--chalk2);line-height:1.5;
  opacity:0;transform:translateX(-10px);
  transition:opacity .3s ease,transform .3s ease;
}
.comp-point.visible{opacity:1;transform:translateX(0)}
.comp-point .cp-icon{flex-shrink:0;margin-top:1px}

/* ── KEYPOINTS STEP ───────────────────────────────────────────────── */
.keypoints-list{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.keypoint{
  display:flex;gap:14px;align-items:flex-start;
  padding:14px;border-radius:10px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  opacity:0;transform:translateX(-14px);
  transition:opacity .35s ease,transform .35s ease;
}
.keypoint.visible{opacity:1;transform:translateX(0)}
.kp-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.kp-text{font-size:14px;color:var(--chalk);line-height:1.6;font-family:'Caveat',cursive;font-size:18px}

/* ── STEP HEADINGS ────────────────────────────────────────────────── */
.step-heading{
  font-family:'Caveat',cursive;font-size:26px;font-weight:600;
  color:var(--chalk);margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.step-heading::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(232,224,208,.15),transparent);
}

/* ── TYPING CURSOR ────────────────────────────────────────────────── */
.chalk-cursor{
  display:inline-block;width:2px;height:1em;
  background:var(--chalk);vertical-align:text-bottom;
  animation:blink .7s step-end infinite;
  margin-left:2px;
}

/* ── SCROLLBAR ────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── RESPONSIVE ───────────────────────────────────────────────────── */
@media(max-width:700px){
  .main{flex-direction:column}
  .sidebar{width:100%;height:auto;flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid var(--border)}
  html,body{overflow:auto}
  .concept-card,.comparison-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <span class="topbar-logo">MaitriLearn</span>
    <span class="topbar-sep">/</span>
    <span class="topbar-title">AI Teacher Board</span>
    <div class="topbar-spacer"></div>
    <a href="index.html" class="topbar-back">← Back to Dashboard</a>
  </header>

  <div class="main">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="avatar-area">
        <div class="avatar-ring" id="avatarRing">🧑‍🏫</div>
        <div class="tutor-name" id="tutorName">DR. MAITHRI</div>
      </div>

      <div class="speech-bubble">
        <span id="speechText">Hello! Enter a topic and I'll teach you step by step 👋</span>
      </div>

      <div class="controls">
        <div class="topic-wrap">
          <input id="topicInput" class="topic-input" placeholder="e.g. Docker, Kubernetes, Git...">
          <button id="startBtn" class="btn btn-primary" onclick="startLesson()">▶ Start Lesson</button>
          <button id="pauseBtn" class="btn btn-secondary" onclick="togglePause()" disabled>⏸ Pause</button>
          <button class="btn btn-danger" onclick="clearLesson()">✕ Clear Board</button>
        </div>
      </div>

      <!-- Speed control -->
      <div class="speed-row">
        <span class="speed-label">⏱ Speed</span>
        <input type="range" id="speedSlider" class="speed-slider" min="0.5" max="2" step="0.1" value="1">
        <span class="speed-label" id="speedVal">1×</span>
      </div>

      <!-- Voice toggle -->
      <div class="voice-row">
        <label>
          <input type="checkbox" id="voiceToggle" checked>
          🔊 Voice narration
        </label>
      </div>

      <!-- Step list -->
      <div class="steps-section">
        <div class="steps-header">Lesson Steps</div>
        <div id="stepList"></div>
      </div>

      <!-- Status -->
      <div class="status-row">
        <div class="status-pill" id="statusPill">
          <div class="status-dot"></div>
          <span>READY</span>
        </div>
      </div>

    </aside>

    <!-- CHALKBOARD -->
    <main class="board-wrap">
      <div id="boardScroll">
        <div id="boardContent"></div>
      </div>
      <div class="idle-overlay" id="idleOverlay">
        <div class="idle-icon">🖊️</div>
        <div class="idle-text">Enter a topic and press Start Lesson<br>to begin guided teaching</div>
      </div>
    </main>

  </div>
</div>

<script src="js/config.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const BACKEND = typeof BACKEND_URL     !== "undefined" ? BACKEND_URL     : "http://localhost:5000";
const VOICE   = typeof VOICE_TUTOR_URL !== "undefined" ? VOICE_TUTOR_URL : "http://localhost:5001";

// ── STATE ─────────────────────────────────────────────────────────────────────
let lesson=null, stepIndex=0, paused=false, running=false;
let currentAudio=null, _timers=[];

// Speed multiplier from slider
function getSpeed(){ return parseFloat(document.getElementById("speedSlider").value)||1; }
document.getElementById("speedSlider").addEventListener("input",e=>{
  document.getElementById("speedVal").textContent = parseFloat(e.target.value).toFixed(1)+"×";
});

// ── COLORS ────────────────────────────────────────────────────────────────────
const STEP_COLORS=[
  {bg:"rgba(88,166,255,.1)",   border:"rgba(88,166,255,.4)",   text:"#58a6ff",  num:"rgba(88,166,255,.15)"},
  {bg:"rgba(188,140,255,.1)",  border:"rgba(188,140,255,.4)",  text:"#bc8cff",  num:"rgba(188,140,255,.15)"},
  {bg:"rgba(63,185,80,.1)",    border:"rgba(63,185,80,.4)",    text:"#3fb950",  num:"rgba(63,185,80,.15)"},
  {bg:"rgba(210,153,34,.1)",   border:"rgba(210,153,34,.4)",   text:"#d29922",  num:"rgba(210,153,34,.15)"},
  {bg:"rgba(255,166,87,.1)",   border:"rgba(255,166,87,.4)",   text:"#ffa657",  num:"rgba(255,166,87,.15)"},
  {bg:"rgba(57,211,240,.1)",   border:"rgba(57,211,240,.4)",   text:"#39d3f0",  num:"rgba(57,211,240,.15)"},
];

const STEP_ICONS={title:"🏷",concept:"💡",steps:"📋",example:"⚙️",diagram:"🗂",comparison:"⚖️",keypoints:"⭐"};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
function wait(ms){ return new Promise(r=>{const t=setTimeout(r,ms/getSpeed());_timers.push(t);}); }
function clearAllTimers(){ _timers.forEach(clearTimeout);_timers=[];if(currentAudio){currentAudio.pause();currentAudio=null;}setTalking(false); }
const setStatus=(t,c="")=>{ const e=$("statusPill"); e.innerHTML=`<div class="status-dot"></div><span>${t}</span>`; e.className="status-pill "+c; };
const setSpeech=t=>{ const e=$("speechText"); if(e) e.textContent=t; };
const setTalking=y=>{ const r=$("avatarRing"); if(r) y?r.classList.add("talking"):r.classList.remove("talking"); };
const show=id=>{ const e=document.getElementById(id); if(e) e.classList.add("visible"); };

// ── BOARD HELPERS ─────────────────────────────────────────────────────────────
function clearBoard(){
  $("boardContent").innerHTML="";
  $("idleOverlay").classList.remove("hidden");
}

// Append a new card to the board (STEP MEMORY — never erase)
function appendCard(html){
  $("idleOverlay").classList.add("hidden");
  const wrap=document.createElement("div");
  wrap.innerHTML=html;
  const card=wrap.firstElementChild;
  $("boardContent").appendChild(card);
  // Scroll to new card
  setTimeout(()=>{
    card.scrollIntoView({behavior:"smooth",block:"start"});
    card.classList.add("visible");
  },80);
  return card;
}

// Typing effect — writes text char by char into an element
async function typeInto(el, text, speed=28){
  if(!el) return;
  el.textContent="";
  const cursor=document.createElement("span");
  cursor.className="chalk-cursor";
  el.appendChild(cursor);
  for(const ch of text){
    if(paused) return;
    cursor.before(document.createTextNode(ch));
    await wait(speed);
  }
  cursor.remove();
}

// ── SIDEBAR STEP LIST ─────────────────────────────────────────────────────────
function buildStepList(steps){
  $("stepList").innerHTML=steps.map((s,i)=>`
    <div class="step-row" id="srow_${i}">
      <span class="s-icon">${STEP_ICONS[s.type]||"•"}</span>
      <span class="s-num">${i+1}</span>
      <span class="s-label">${s.heading||s.text||s.type}</span>
    </div>`).join("");
}
function markStep(i,state){
  document.querySelectorAll(".step-row").forEach((el,idx)=>{
    el.className="step-row"+(idx===i?" "+state:idx<i?" done":"");
  });
}

// ── RENDERERS ─────────────────────────────────────────────────────────────────

async function renderTitle(step){
  const card=appendCard(`
    <div class="step-card title-card">
      <div class="title-subject">${lesson.subject||"AI Lesson"}</div>
      <h1 class="title-main" id="titleMain"></h1>
      <p class="title-subtitle" id="titleSub"></p>
      <div class="title-line"></div>
    </div>`);
  await wait(300);
  await typeInto($("titleMain"), step.text||lesson.title||"Lesson", 38);
  await wait(200);
  if(step.subtitle){
    const sub=$("titleSub");
    if(sub){ sub.style.opacity="0";sub.style.transition="opacity .6s"; sub.textContent=step.subtitle; await wait(100); sub.style.opacity="1"; }
  }
  await wait(600);
}

async function renderConcept(step){
  const card=appendCard(`
    <div class="step-card">
      <h2 class="step-heading">${STEP_ICONS.concept} ${step.heading||"Concept"}</h2>
      <div class="concept-card">
        <div class="concept-def">
          <div class="card-label">Definition</div>
          <p class="card-text" id="cDef"></p>
        </div>
        <div class="concept-analogy">
          <div class="card-label">Think of it like…</div>
          <p class="card-text chalk" id="cAnalogy"></p>
        </div>
      </div>
    </div>`);
  await wait(300);
  await typeInto($("cDef"), step.definition||"", 22);
  await wait(300);
  await typeInto($("cAnalogy"), step.analogy||"", 18);
  await wait(400);
}

async function renderStepsType(step){
  const items=step.items||[];
  const itemsHTML=items.map((item,i)=>{
    const c=STEP_COLORS[i%STEP_COLORS.length];
    return `<div class="step-item" id="si_${i}">
      <div class="step-num" style="color:${c.text};border-color:${c.border};background:${c.num}">${i+1}</div>
      <div>
        <div class="step-name">${item.step}</div>
        <div class="step-detail">${item.detail}</div>
      </div>
    </div>`;
  }).join("");

  appendCard(`
    <div class="step-card">
      <h2 class="step-heading">${STEP_ICONS.steps} ${step.heading||"How It Works"}</h2>
      <div class="steps-card">${itemsHTML}</div>
    </div>`);

  await wait(300);
  for(let i=0;i<items.length;i++){
    if(paused) return;
    show(`si_${i}`);
    await wait(350);
  }
  await wait(400);
}

async function renderExample(step){
  const hasCode = step.code && step.code.trim().length > 0;
  appendCard(`
    <div class="step-card">
      <h2 class="step-heading">${STEP_ICONS.example} ${step.heading||"Real Example"}</h2>
      <div class="example-scenario" id="exScenario"></div>
      ${hasCode?`<div class="code-block"><span class="code-prompt">$ </span><span id="exCode"></span></div>`:""}
      <div class="example-explanation" id="exExplain"></div>
    </div>`);

  await wait(300);
  await typeInto($("exScenario"), step.scenario||"", 20);
  if(hasCode && $("exCode")){
    await wait(200);
    await typeInto($("exCode"), step.code, 30);
  }
  await wait(200);
  const exp=$("exExplain");
  if(exp){ exp.style.opacity="0";exp.style.transition="opacity .5s";exp.textContent=step.explanation||""; await wait(100); exp.style.opacity="1"; }
  await wait(400);
}

async function renderDiagram(step){
  const elements=step.elements||[];
  const roleColor={input:"#58a6ff",process:"#bc8cff",output:"#3fb950"};
  const cardsHTML=elements.map((el,i)=>{
    const c=STEP_COLORS[i%STEP_COLORS.length];
    const role=el.role||"";
    const roleStyle=roleColor[role.toLowerCase()]||"#8b949e";
    return `<div class="diag-el" id="de_${i}" style="border-top:2px solid ${c.border}">
      <div class="diag-num" style="background:${c.num};color:${c.text}">${i+1}</div>
      <div class="diag-label">${el.label}</div>
      <div class="diag-desc">${el.description||""}</div>
      ${role?`<div class="diag-role" style="background:${roleStyle}22;color:${roleStyle}">${role}</div>`:""}
    </div>`;
  }).join("");

  appendCard(`
    <div class="step-card">
      <h2 class="step-heading">${STEP_ICONS.diagram} ${step.heading||"Architecture"}</h2>
      <div class="diagram-card-wrap">${cardsHTML}</div>
    </div>`);

  await wait(300);
  for(let i=0;i<elements.length;i++){
    if(paused) return;
    show(`de_${i}`);
    await wait(280);
  }
  await wait(400);
}

async function renderComparison(step){
  const left=step.left_points||[];
  const right=step.right_points||[];
  const max=Math.max(left.length,right.length);
  const leftHTML=left.map((p,i)=>`<div class="comp-point" id="cl_${i}"><span class="cp-icon">✗</span><span>${p}</span></div>`).join("");
  const rightHTML=right.map((p,i)=>`<div class="comp-point" id="cr_${i}"><span class="cp-icon">✓</span><span>${p}</span></div>`).join("");

  appendCard(`
    <div class="step-card">
      <h2 class="step-heading">${STEP_ICONS.comparison} ${step.heading||"Comparison"}</h2>
      <div class="comparison-grid">
        <div class="comp-side left">
          <div class="comp-label">${step.left_label||"Before"}</div>
          ${leftHTML}
        </div>
        <div class="comp-side right">
          <div class="comp-label">${step.right_label||"After"}</div>
          ${rightHTML}
        </div>
      </div>
    </div>`);

  await wait(300);
  for(let i=0;i<max;i++){
    if(paused) return;
    show(`cl_${i}`);
    show(`cr_${i}`);
    await wait(300);
  }
  await wait(400);
}

async function renderKeypoints(step){
  const points=step.points||[];
  const rowsHTML=points.map((p,i)=>{
    const icon=typeof p==="object"?p.icon:"⭐";
    const text=typeof p==="object"?p.text:p;
    return `<div class="keypoint" id="kp_${i}">
      <span class="kp-icon">${icon}</span>
      <div class="kp-text" id="kpText_${i}"></div>
    </div>`;
  }).join("");

  appendCard(`
    <div class="step-card">
      <h2 class="step-heading">${STEP_ICONS.keypoints} ${step.heading||"Remember This"}</h2>
      <div class="keypoints-list">${rowsHTML}</div>
    </div>`);

  await wait(300);
  for(let i=0;i<points.length;i++){
    if(paused) return;
    show(`kp_${i}`);
    const text=typeof points[i]==="object"?points[i].text:points[i];
    const el=$(`kpText_${i}`);
    await wait(120);
    await typeInto(el, text, 18);
    await wait(180);
  }
  await wait(500);
}

// ── DISPATCH ──────────────────────────────────────────────────────────────────
async function renderStep(step){
  switch(step.type){
    case "title":      await renderTitle(step);      break;
    case "concept":    await renderConcept(step);    break;
    case "steps":      await renderStepsType(step);  break;
    case "example":    await renderExample(step);    break;
    case "diagram":    await renderDiagram(step);    break;
    case "comparison": await renderComparison(step); break;
    case "keypoints":  await renderKeypoints(step);  break;
    // Fallback for old step types
    case "text":       await renderConcept({...step, definition:step.body, analogy:""}); break;
    case "flowchart":  await renderStepsType({...step, items:(step.nodes||[]).map(n=>({step:n,detail:""}))}); break;
    default:           await renderConcept({...step, definition:step.body||step.text||"", analogy:""}); break;
  }
}

// ── NARRATION ─────────────────────────────────────────────────────────────────
function narrate(text){
  return new Promise(resolve=>{
    setSpeech(text);
    setTalking(true);
    const speed=getSpeed();
    const fallback=Math.min(Math.max((text.length*55)/speed,2000),10000);
    const useVoice=$("voiceToggle")&&$("voiceToggle").checked;

    if(!useVoice){
      _timers.push(setTimeout(()=>{setTalking(false);resolve();},fallback));
      return;
    }

    fetch(`${VOICE}/generate`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt:text})
    })
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
    .then(data=>{
      const audio=new Audio(`${VOICE}${data.audio}`);
      currentAudio=audio;
      audio.playbackRate=speed;
      audio.onended=()=>{setTalking(false);currentAudio=null;resolve();};
      audio.onerror=()=>{setTalking(false);currentAudio=null;resolve();};
      audio.play().catch(()=>{setTalking(false);resolve();});
    })
    .catch(()=>{
      _timers.push(setTimeout(()=>{setTalking(false);resolve();},fallback));
    });
  });
}

// ── RUNNER ────────────────────────────────────────────────────────────────────
async function runStep(index){
  if(!lesson||index>=lesson.steps.length){
    setStatus("DONE ✓","");
    setSpeech("Lesson complete! Well done! 🎉");
    setTalking(false);
    if($("startBtn")) $("startBtn").disabled=false;
    if($("pauseBtn")) $("pauseBtn").disabled=true;
    running=false; return;
  }
  if(paused) return;

  stepIndex=index;
  markStep(index,"active");
  const step=lesson.steps[index];

  await renderStep(step);
  if(paused) return;

  await narrate(step.narration||step.heading||step.text||"");
  if(paused) return;

  markStep(index,"done");
  await wait(400);
  runStep(index+1);
}

// ── PUBLIC API ────────────────────────────────────────────────────────────────
window.startLesson=async function(){
  const topic=($("topicInput")||{}).value?.trim();
  if(!topic){alert("Please enter a topic!");return;}

  clearAllTimers();clearBoard();
  paused=false;running=true;stepIndex=0;

  $("startBtn").disabled=true;
  $("pauseBtn").disabled=false;
  $("pauseBtn").textContent="⏸ Pause";
  $("stepList").innerHTML="";
  setStatus("LOADING","loading");
  setSpeech(`Preparing lesson on "${topic}"...`);

  try{
    const res=await fetch(`${BACKEND}/whiteboard/lesson`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({topic})
    });
    if(!res.ok) throw new Error("Backend "+res.status);
    const data=await res.json();
    if(data.error) throw new Error(data.error);

    lesson=data.lesson;
    buildStepList(lesson.steps);
    setStatus("TEACHING","teaching");
    setSpeech(`Starting: ${lesson.title}!`);
    runStep(0);

  }catch(err){
    console.error(err);
    setStatus("ERROR","error");
    setSpeech("Could not load lesson. Check backend connection.");
    $("startBtn").disabled=false;
    $("pauseBtn").disabled=true;
    running=false;
  }
};

window.togglePause=function(){
  paused=!paused;
  const btn=$("pauseBtn");
  if(paused){
    clearAllTimers();
    btn.textContent="▶ Resume";
    setStatus("PAUSED","paused");
    setSpeech("Paused. Press Resume to continue.");
  }else{
    btn.textContent="⏸ Pause";
    setStatus("TEACHING","teaching");
    runStep(stepIndex);
  }
};

window.clearLesson=function(){
  clearAllTimers();clearBoard();
  lesson=null;running=false;paused=false;
  $("startBtn").disabled=false;
  $("pauseBtn").disabled=true;
  $("pauseBtn").textContent="⏸ Pause";
  $("stepList").innerHTML="";
  setStatus("READY","");
  setSpeech("Hello! Enter a topic and I'll teach you step by step 👋");
};
</script>
